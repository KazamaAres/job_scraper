name: Daily Job Scraper

on:
  schedule:
    # 8am Auckland NZST (UTC+12) = 20:00 UTC previous day
    # During NZDT (UTC+13, Oct-Mar) this fires at 9am — close enough
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py
        continue-on-error: true

      - name: Ensure jobs_today.html exists
        run: |
          if [ ! -f jobs_today.html ]; then
            TODAY=$(date +%Y-%m-%d)
            cat > jobs_today.html <<EOF
          <!DOCTYPE html>
          <html lang="zh"><head><meta charset="utf-8">
          <title>今日职位推送 — $TODAY</title>
          <style>body{font-family:sans-serif;text-align:center;padding:60px;color:#888;}</style>
          </head><body>
          <h1>📋 今日职位推送</h1>
          <p>$TODAY · 抓取失败，请检查 Actions 日志</p>
          </body></html>
          EOF
          fi

      - name: Prepare Pages directory
        run: |
          mkdir -p public
          cp jobs_today.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
